# Bordiko web client — single-page app served by nginx.
#
# The app uses History-API routing (clean paths like /games/hive, /play/{id}),
# so any path that isn't a real file must fall back to index.html, or a refresh /
# deep-link would 404.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: serve index.html for unknown routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Content-hashed assets are immutable — cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Never cache the shell, so a redeploy is picked up immediately.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
